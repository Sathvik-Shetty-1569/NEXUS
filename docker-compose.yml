services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=nexus
    volumes:
      - nexus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  nexus:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    # No volumes needed -- the app is fully stateless now. Corpus,
    # checkpoints, users, and interviews all live in Postgres.
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/nexus

volumes:
  nexus_pgdata:
